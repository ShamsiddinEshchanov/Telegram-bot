<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hunter System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Wallet-inspired dark theme */
            --bg: #000000;
            --surface: #101217;
            --surface-hover: #1c2028;
            --surface-card: #181921;
            --text: #ffffff;
            --text-dim: #8b92a5;
            --accent: #3298ec;
            --accent-glow: rgba(50, 152, 236, 0.4);
            --arc-bg: rgba(255, 255, 255, 0.06);
            --glass-bg: rgba(28, 32, 40, 0.85);
            --gold: #f59e0b;
            --green: #10b981;
            --red: #e11d48;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 120px;
            /* Space for floating nav */
            user-select: none;
        }

        /* Top Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
        }

        .profile-pic {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--text-dim));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .toggle-switch {
            background: var(--surface-hover);
            border-radius: 20px;
            padding: 3px;
            display: flex;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 6px 16px;
            border-radius: 16px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-btn.active {
            background: var(--surface-card);
            color: var(--text);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        /* Arc Progress Area (Hero) */
        .hero-arc {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin: 20px auto 10px;
            text-align: center;
        }

        .arc-svg {
            width: 100%;
            overflow: visible;
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -20%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .steps-remaining {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .headline {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.2;
            padding: 0 20px;
        }

        .main-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
            margin-top: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .main-btn:active {
            transform: scale(0.97);
        }

        /* Action Buttons Grid */
        .actions-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            margin-bottom: 5px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .action-circle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--surface-hover);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text);
            transition: all 0.2s;
        }

        .action-item:active .action-circle {
            background: var(--surface-card);
            transform: scale(0.95);
        }

        .action-label {
            font-size: 0.8rem;
            font-weight: 500;
            text-align: center;
        }

        /* Banner */
        .banner {
            margin: 0 20px 25px;
            background: linear-gradient(135deg, #1d92f5, #00cbff);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .banner::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 0L100 50L50 100L0 50Z" fill="rgba(255,255,255,0.1)"/></svg>') center/cover;
            opacity: 0.4;
        }

        .banner-content {
            position: relative;
            z-index: 1;
        }

        .banner-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .banner-subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .banner-close {
            position: absolute;
            top: 10px;
            right: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            background: none;
            border: none;
            z-index: 2;
            cursor: pointer;
        }

        /* Sections / Lists */
        .section {
            display: none;
            animation: fadeIn 0.3s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            padding: 0 20px;
            margin-bottom: 12px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .list-container {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: var(--surface-card);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-info h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-info p {
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .card-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pill-btn {
            background: var(--surface-hover);
            color: var(--accent);
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .check-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--text-dim);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: transparent;
            font-size: 0.7rem;
            transition: 0.2s;
        }

        .card.done-card {
            opacity: 0.6;
        }

        .card.done-card .check-btn {
            background: var(--green);
            border-color: var(--green);
            color: #fff;
        }

        /* Input specific design */
        .add-input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            padding: 0 20px;
        }

        .glass-input {
            flex: 1;
            background: var(--surface-card);
            border: 1px solid var(--arc-bg);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .add-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 0 16px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Modals Native-like */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .bottom-sheet {
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            width: 100%;
            padding: 24px 20px 40px;
            transform: translateY(100%);
            transition: 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .modal-overlay.active .bottom-sheet {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: #2b303b;
            border-radius: 2px;
            margin: -10px auto 20px;
        }

        /* Floating Bottom Nav (Wallet style) */
        .bottom-nav-container {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
            z-index: 1000;
        }

        .floating-nav {
            pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            display: flex;
            padding: 6px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 24px;
            border-radius: 24px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s;
            min-width: 80px;
            text-decoration: none;
        }

        .nav-item i {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .nav-item span {
            font-size: 0.75rem;
            font-weight: 500;
        }

        .nav-item.active {
            background: #1c2534;
            /* Slightly lighter blue-tinged dark */
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 30px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- Header Toggle -->
    <div class="header">
        <div class="profile-pic" id="profile-btn">
            <i class="fa-solid fa-user"></i>
        </div>
        <div class="toggle-switch">
            <button class="toggle-btn active" onclick="setMode('kunlik')">Kunlik</button>
            <button class="toggle-btn" onclick="setMode('doimiy')">Doimiy</button>
        </div>
        <div style="width: 36px;"></div> <!-- Spacer for flex centering -->
    </div>

    <!-- Main Arc Progress -->
    <div class="hero-arc">
        <svg viewBox="0 0 100 55" class="arc-svg">
            <defs>
                <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#3298ec" />
                    <stop offset="100%" stop-color="#4fd1c5" />
                </linearGradient>
            </defs>
            <!-- Background Arc -->
            <path d="M 5 50 A 45 45 0 0 1 95 50" fill="none" stroke="var(--arc-bg)" stroke-width="8"
                stroke-linecap="round" />
            <!-- Foreground Progress -->
            <path id="progress-arc" d="M 5 50 A 45 45 0 0 1 95 50" fill="none" stroke="url(#arcGrad)" stroke-width="8"
                stroke-linecap="round" stroke-dasharray="141" stroke-dashoffset="141"
                style="transition: stroke-dashoffset 1s ease-out;" />
        </svg>
        <div class="hero-content">
            <div class="steps-remaining" id="rank-name">E-Rank</div>
            <div class="headline" id="rank-headline">XP uchun maqsad qo'ying</div>
            <button class="main-btn" onclick="openBottomSheet()">Yangi Vazifa</button>
        </div>
    </div>

    <!-- Quick Actions Grid -->
    <div class="actions-grid">
        <div class="action-item" onclick="openBottomSheet()">
            <div class="action-circle"><i class="fa-solid fa-plus"></i></div>
            <span class="action-label">Qo'shish</span>
        </div>
        <div class="action-item" onclick="switchMainTab('skills')">
            <div class="action-circle"><i class="fa-solid fa-dumbbell"></i></div>
            <span class="action-label">Mashq</span>
        </div>
        <div class="action-item" onclick="showStats()">
            <div class="action-circle"><i class="fa-solid fa-chart-line"></i></div>
            <span class="action-label">Hisobot</span>
        </div>
        <div class="action-item">
            <div class="action-circle"><i class="fa-solid fa-gift"></i></div>
            <span class="action-label">Mukofot</span>
        </div>
    </div>

    <!-- Banner -->
    <div class="banner" id="promo-banner">
        <div class="banner-content">
            <div class="banner-title">S-Rank gacha ko'tariling!</div>
            <div class="banner-subtitle">Vazifalarni muntazam ravishda bajaring.</div>
        </div>
        <i class="fa-solid fa-bolt" style="color: rgba(255,255,255,0.7); font-size: 2rem;"></i>
        <button class="banner-close" onclick="document.getElementById('promo-banner').style.display='none'"><i
                class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Content Sections -->
    <div id="section-home" class="section active">
        <!-- Depending on toggle, show daily or ongoing -->
        <h3 class="section-header" id="list-title">Bugungi Vazifalar</h3>
        <div class="list-container" id="tasks-container">
            <!-- Rendered by JS -->
        </div>
    </div>

    <div id="section-skills" class="section">
        <h3 class="section-header">Ko'nikmalarni oshirish</h3>
        <div class="add-input-wrapper">
            <input type="text" id="skill-input" class="glass-input" placeholder="masalan: Dasturlash...">
            <button class="add-btn" onclick="addSkill()">Qo'shish</button>
        </div>
        <div class="list-container" id="skills-container"></div>
    </div>

    <!-- Floating Bottom Nav -->
    <div class="bottom-nav-container">
        <div class="floating-nav">
            <div class="nav-item active" id="nav-btn-home" onclick="switchMainTab('home')">
                <i class="fa-solid fa-wallet"></i>
                <span>Tizim</span>
            </div>
            <div class="nav-item" id="nav-btn-skills" onclick="switchMainTab('skills')">
                <i class="fa-solid fa-chart-simple"></i>
                <span>Sohalar</span>
            </div>
            <div class="nav-item" onclick="alert('Analiz qismi tez orada ishga tushadi! Davom eting.')">
                <i class="fa-solid fa-percent"></i>
                <span>Daromad</span>
            </div>
        </div>
    </div>


    <!-- Bottom Sheet Modal: Add Quest -->
    <div class="modal-overlay" id="bottom-sheet-modal" onclick="closeBottomSheet(event)">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <h2 style="margin-bottom: 20px; font-size: 1.2rem;">Yangi Maqsad Qo'shish</h2>

            <input type="text" id="bs-quest" class="glass-input" style="width:100%; margin-bottom: 12px;"
                placeholder="Maqsad nomi...">

            <button class="main-btn" style="width:100%; height: 45px; font-size:1rem;"
                onclick="submitBottomTask()">Tasdiqlash</button>
        </div>
    </div>

    <script>
        // Init Telegram WebApp
        let tg = null;
        try {
            tg = window.Telegram.WebApp;
            tg.expand();
            let user = tg.initDataUnsafe?.user;
            if (user && user.first_name) {
                document.getElementById('profile-btn').innerHTML = user.first_name.charAt(0).toUpperCase();
            }
        } catch (e) { }

        const XP_DAILY = 10;
        let mode = 'kunlik'; // 'kunlik' yoki 'doimiy'
        let currentTab = 'home';

        // State setup
        let state = {
            quests: [],
            skills: [],
            totalXP: 0
        };

        function initApp() {
            let saved = localStorage.getItem('wallet_hunter');
            if (saved) {
                state = JSON.parse(saved);
            }
            // default mock data for showcase
            if (state.quests.length === 0) {
                state.quests.push({ id: 1, name: "10000 qadam yurish", type: 'kunlik', done: false });
                state.quests.push({ id: 2, name: "20 bet kitob o'qish", type: 'kunlik', done: false });
            }

            renderUI();
        }

        function saveState() {
            localStorage.setItem('wallet_hunter', JSON.stringify(state));
            renderUI();
        }

        // --- Core UI Updates ---
        function renderUI() {
            updateArcProgress();
            renderList();
            if (currentTab === 'skills') renderSkills();
        }

        function updateArcProgress() {
            // Rank tiers
            const ranks = [
                { n: 'E-Rank', xp: 0, next: 100 },
                { n: 'D-Rank', xp: 100, next: 300 },
                { n: 'C-Rank', xp: 300, next: 700 },
                { n: 'B-Rank', xp: 700, next: Infinity }
            ];

            let curLevel = ranks[0];
            for (let r of ranks) {
                if (state.totalXP >= r.xp) curLevel = r;
            }

            document.getElementById('rank-name').innerText = curLevel.n;
            if (curLevel.next !== Infinity) {
                let txt = `Max levelga ${curLevel.next - state.totalXP} XP qoldi`;
                document.getElementById('rank-headline').innerText = txt;
                let pct = (state.totalXP - curLevel.xp) / (curLevel.next - curLevel.xp);
                let offset = 141 - Math.max(0, Math.min(141, pct * 141));
                document.getElementById('progress-arc').style.strokeDashoffset = offset;
            } else {
                document.getElementById('rank-headline').innerText = `Maksimal Daraja!`;
                document.getElementById('progress-arc').style.strokeDashoffset = 0;
            }
        }

        function renderList() {
            let c = document.getElementById('tasks-container');
            let qList = state.quests.filter(q => mode === 'kunlik' ? q.type !== 'doimiy' : q.type === 'doimiy');

            if (qList.length === 0) {
                c.innerHTML = `<div class="empty-state">Hozircha ${mode} vazifalar yo'q!</div>`;
                return;
            }

            let html = '';
            qList.forEach(q => {
                html += `
                <div class="card ${q.done ? 'done-card' : ''}" onclick="toggleQuest(${q.id}, event)">
                    <div class="card-info">
                        <h4>${q.name}</h4>
                        <p>Mukofot: ${q.type === 'doimiy' ? '50XP' : '+10XP'}</p>
                    </div>
                    <div class="card-controls">
                        <div class="check-btn">
                            <i class="fa-solid fa-check"></i>
                        </div>
                    </div>
                </div>`;
            });
            c.innerHTML = html;
        }

        function toggleQuest(id, e) {
            let q = state.quests.find(x => x.id === id);
            if (!q) return;
            if (!q.done) {
                q.done = true;
                state.totalXP += q.type === 'doimiy' ? 50 : 10;
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            } else {
                q.done = false;
                state.totalXP -= q.type === 'doimiy' ? 50 : 10;
            }
            saveState();
        }

        function renderSkills() {
            let c = document.getElementById('skills-container');
            if (state.skills.length === 0) {
                c.innerHTML = `<div class="empty-state">Ko'nikmalar hali qo'shilmagan!</div>`;
                return;
            }
            let html = '';
            state.skills.forEach(s => {
                html += `
                <div class="card">
                    <div class="card-info">
                        <h4>${s.name}</h4>
                        <p>Lvl ${s.lvl} • ${s.xp}/${s.lvl * 20} XP</p>
                    </div>
                    <button class="pill-btn" onclick="trainSkill(${s.id})">Mashq +5XP</button>
                </div>`;
            });
            c.innerHTML = html;
        }

        // --- View Logic ---
        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.toggle-btn').forEach(b => {
                if (b.innerText.toLowerCase() === mode) b.classList.add('active');
                else b.classList.remove('active');
            });
            document.getElementById('list-title').innerText = mode === 'kunlik' ? "Bugungi Vazifalar" : "Uzoq Muddatli Maqsadlar";
            renderUI();
        }

        function switchMainTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + tab).classList.add('active');

            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-btn-' + tab).classList.add('active');

            renderUI();
        }

        // Actions
        function openBottomSheet() {
            document.getElementById('bottom-sheet-modal').classList.add('active');
            document.getElementById('bs-quest').value = '';
            document.getElementById('bs-quest').focus();
        }
        function closeBottomSheet(e) {
            if (e.target.id === 'bottom-sheet-modal') {
                document.getElementById('bottom-sheet-modal').classList.remove('active');
            }
        }

        function submitBottomTask() {
            const val = document.getElementById('bs-quest').value.trim();
            if (val) {
                state.quests.push({
                    id: Date.now(),
                    name: val,
                    type: mode,
                    done: false
                });
                document.getElementById('bottom-sheet-modal').classList.remove('active');
                saveState();
            }
        }

        function addSkill() {
            const val = document.getElementById('skill-input').value.trim();
            if (val) {
                state.skills.push({ id: Date.now(), name: val, lvl: 1, xp: 0 });
                document.getElementById('skill-input').value = '';
                saveState();
            }
        }

        function trainSkill(id) {
            let s = state.skills.find(x => x.id === id);
            if (s) {
                s.xp += 5;
                state.totalXP += 5;
                if (s.xp >= s.lvl * 20) {
                    s.xp = 0; s.lvl++;
                }
                saveState();
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            }
        }

        function showStats() {
            tg?.showAlert("Jami yig'ilgan XP: " + state.totalXP + "\nYana shunday davom eting!");
        }

        // Start
        initApp();
    </script>
</body>

</html>
